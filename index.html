<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Expense Tracker</title>
<style>
  :root {
    --bg: #fbfaf8; --surface: #ffffff; --surface-2: #f4f2ef; --border: #e3e0db;
    --text: #2b2925; --text-2: #6b6660; --text-3: #9b958c;
    --accent: #2f6f6b; --accent-bg: #e7f1f0;
    --danger: #b3493f; --danger-bg: #fbeae8;
    --success: #3f7d4f; --success-bg: #eaf5ec;
    --gold: #a07828; --gold-bg: #fdf4e3;
    --radius: 10px; --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-variant-numeric: tabular-nums; }
  #app { max-width: 460px; margin: 0 auto; padding: 0 16px 88px; min-height: 100vh; }
  header { display: flex; align-items: baseline; justify-content: space-between; padding: 16px 0 12px; }
  h1 { font-size: 22px; font-weight: 600; }
  .saving-tag { font-size: 12px; color: var(--text-3); }
  .flash-banner { font-size: 13px; border-radius: var(--radius); padding: 8px 12px; margin-bottom: 12px; display: none; align-items: center; gap: 6px; }
  .flash-banner.show { display: flex; }
  .flash-banner.error { color: var(--danger); background: var(--danger-bg); border: 1px solid var(--danger); }
  .flash-banner.success { color: var(--success); background: var(--success-bg); border: 1px solid var(--success); }
  main { min-height: 320px; }

  /* typography */
  .section-label { font-size: 12.5px; color: var(--text-2); margin: 0 0 8px; }
  .section-header-row { display: flex; align-items: center; justify-content: space-between; margin: 20px 0 8px; }
  .section-header-row .section-label { margin: 0; }
  .hint { font-size: 12.5px; color: var(--text-3); margin-top: 6px; }

  /* metric cards */
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .metric-card { background: var(--surface-2); border-radius: var(--radius); padding: 12px; }
  .metric-card.full { grid-column: 1 / -1; }
  .metric-label { font-size: 11.5px; color: var(--text-2); margin: 0 0 3px; }
  .metric-value { font-size: 22px; font-weight: 600; }
  .metric-value.danger { color: var(--danger); }
  .metric-value.sm { font-size: 16px; }

  /* year/month picker */
  .picker-row { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 16px; }
  .picker-label { font-size: 15px; font-weight: 600; min-width: 160px; text-align: center; }
  .icon-btn { width: 32px; height: 32px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--text); }
  .icon-btn:hover { background: var(--surface-2); }

  /* bar chart */
  .legend-row { display: flex; gap: 14px; margin-bottom: 6px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-3); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 100px; margin-bottom: 6px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; background: transparent; border: none; cursor: pointer; height: 100%; padding: 0; gap: 3px; }
  .bar-track-double { width: 100%; flex: 1; display: flex; align-items: flex-end; gap: 2px; }
  .bar-fill { flex: 1; border-radius: 2px 2px 0 0; min-height: 0; }
  .bar-month { font-size: 9.5px; color: var(--text-3); }
  .bar-month.current { font-weight: 700; color: var(--text); }

  /* income breakdown */
  .income-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .income-bar-label { font-size: 12px; width: 70px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .income-bar-track { flex: 1; height: 5px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
  .income-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }
  .income-bar-amt { font-size: 12px; width: 60px; text-align: right; flex-shrink: 0; }

  /* pocket cards */
  .pocket-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 10px; }
  .pocket-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .pocket-icon { font-size: 20px; }
  .pocket-name { font-size: 15px; font-weight: 600; flex: 1; }
  .pocket-balance { font-size: 18px; font-weight: 600; }
  .pocket-goal-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .pocket-progress-track { flex: 1; height: 7px; background: var(--surface-2); border-radius: 4px; overflow: hidden; }
  .pocket-progress-fill { height: 100%; background: var(--accent); border-radius: 4px; }
  .pocket-goal-label { font-size: 12px; color: var(--text-2); white-space: nowrap; }
  .pocket-actions { display: flex; gap: 8px; margin-top: 10px; }
  .pocket-btn { flex: 1; padding: 7px; font-size: 13px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface-2); cursor: pointer; color: var(--text); }
  .pocket-btn:hover { background: var(--border); }
  .pocket-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .pocket-txn-list { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .pocket-txn-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .pocket-txn-date { color: var(--text-3); width: 68px; flex-shrink: 0; }
  .pocket-txn-note { flex: 1; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pocket-txn-amt { font-weight: 600; }
  .pocket-txn-amt.deposit { color: var(--success); }
  .pocket-txn-amt.withdraw { color: var(--danger); }

  /* forms */
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .form-group label { font-size: 13px; color: var(--text-2); }
  input, select, textarea { font-size: 15px; padding: 9px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; width: 100%; }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .cat-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; margin-bottom: 14px; }
  .cat-pick { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 9px 4px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; background: var(--surface); }
  .cat-pick .icon { font-size: 18px; }
  .cat-pick .lbl { font-size: 11px; color: var(--text); }
  .cat-pick.selected { border-color: var(--accent); background: var(--accent-bg); }
  .cat-pick.selected .lbl { color: var(--accent); }
  .form-actions { display: flex; gap: 8px; margin-top: 6px; }
  .submit-btn { flex: 1; font-size: 15px; font-weight: 600; padding: 11px; border-radius: var(--radius); border: 1px solid var(--text); background: var(--text); color: var(--surface); cursor: pointer; }
  .submit-btn:hover { opacity: 0.85; }
  .cancel-btn { font-size: 15px; padding: 11px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--text-2); }
  .form-msg { font-size: 13px; text-align: center; margin: 10px 0 0; display: none; }
  .form-msg.ok { color: var(--success); }
  .form-msg.err { color: var(--danger); }

  /* small buttons */
  .small-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 11px; background: var(--surface); cursor: pointer; color: var(--text); white-space: nowrap; }
  .small-btn:hover { background: var(--surface-2); }
  .mini-icon-btn { width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; color: var(--text-3); display: flex; align-items: center; justify-content: center; font-size: 14px; border-radius: 6px; }
  .mini-icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .mini-icon-btn:disabled { opacity: 0.3; cursor: default; }

  /* entry lists */
  .day-group { margin-bottom: 4px; }
  .day-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 4px 4px; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; color: var(--text); font: inherit; }
  .day-header-left { display: flex; align-items: baseline; gap: 8px; }
  .day-date { font-size: 13px; font-weight: 600; }
  .day-total { font-size: 12px; color: var(--text-3); }
  .day-chevron { font-size: 11px; color: var(--text-3); }
  .day-entries { display: flex; flex-direction: column; border-top: 1px solid var(--border); }
  .entry-row { display: flex; align-items: center; gap: 9px; padding: 9px 4px; border-bottom: 1px solid var(--border); }
  .entry-icon { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; }
  .entry-mid { flex: 1; min-width: 0; }
  .entry-cat { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-meta { font-size: 12px; color: var(--text-3); }
  .entry-amt { font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .entry-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .entry-date-full { font-size: 12px; color: var(--text-3); width: 74px; flex-shrink: 0; }

  /* category bars */
  .cat-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .cat-bar-label { font-size: 12.5px; width: 72px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cat-bar-track { flex: 1; height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
  .cat-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }
  .cat-bar-amt { font-size: 12.5px; width: 62px; text-align: right; flex-shrink: 0; }

  /* budget bars */
  .budget-row-btn { display: flex; flex-direction: column; gap: 4px; background: transparent; border: none; padding: 4px 0; cursor: pointer; width: 100%; text-align: left; color: var(--text); font: inherit; }
  .budget-row-head { display: flex; align-items: center; gap: 6px; }
  .budget-row-label { font-size: 13px; flex: 1; }
  .budget-row-amt { font-size: 12px; color: var(--text-2); }
  .budget-row-amt.over { color: var(--danger); }
  .budget-bar-track { position: relative; height: 7px; background: var(--surface-2); border-radius: 4px; overflow: hidden; }
  .budget-bar-budget { position: absolute; top: 0; left: 0; height: 100%; border-right: 2px solid var(--text-2); }
  .budget-bar-spend { position: absolute; top: 0; left: 0; height: 100%; border-radius: 4px; opacity: 0.85; }

  /* sheet (all categories) */
  .sheet-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 8px; }
  .sheet-card-head { width: 100%; display: flex; align-items: center; gap: 8px; padding: 12px 14px; background: transparent; border: none; cursor: pointer; text-align: left; color: var(--text); font: inherit; }
  .sheet-card-label { font-size: 14px; font-weight: 600; flex: 1; }
  .sheet-card-count { font-size: 12px; color: var(--text-3); }
  .sheet-card-total { font-size: 14px; font-weight: 600; min-width: 70px; text-align: right; }
  .sheet-entry-list { border-top: 1px solid var(--border); display: flex; flex-direction: column; }
  .sheet-empty { font-size: 13px; color: var(--text-3); padding: 0 14px 12px; }

  /* manage */
  .manage-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px; margin-bottom: 10px; }
  .manage-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .icon-pick-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .icon-pick-btn { width: 32px; height: 32px; border-radius: var(--radius); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--surface); font-size: 16px; }
  .icon-pick-btn.selected { border-color: var(--accent); background: var(--accent-bg); }
  .budget-edit-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .budget-edit-label { font-size: 12px; color: var(--text-2); flex-shrink: 0; width: 100px; }
  .new-item-card { background: var(--surface-2); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 10px; }

  /* empty */
  .empty-state { text-align: center; padding: 40px 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .empty-state .big-icon { font-size: 32px; }
  .empty-text { font-size: 14px; color: var(--text-2); }

  /* all years */
  .year-summary-row { display: flex; align-items: center; gap: 10px; background: var(--surface-2); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 8px; cursor: pointer; border: none; width: 100%; text-align: left; color: var(--text); font: inherit; }
  .year-summary-row:hover { background: var(--border); }
  .year-summary-yr { font-size: 14px; font-weight: 600; width: 40px; flex-shrink: 0; }
  .year-summary-mid { flex: 1; }
  .year-summary-label { font-size: 11.5px; color: var(--text-2); }
  .year-summary-val { font-size: 13.5px; font-weight: 500; }
  .year-summary-chevron { font-size: 12px; color: var(--text-3); }

  /* income input in month */
  .income-section { background: var(--surface-2); border-radius: var(--radius-lg); padding: 12px; margin-bottom: 16px; }
  .income-type-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .income-type-icon { font-size: 16px; width: 22px; text-align: center; }
  .income-type-label { font-size: 13px; flex: 1; }
  .income-type-input { width: 110px !important; flex-shrink: 0; font-size: 14px; padding: 6px 8px; }

  /* tab bar */
  nav.tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 2px 7px; background: transparent; border: none; cursor: pointer; color: var(--text-3); font: inherit; }
  .tab-btn .tab-icon { font-size: 18px; }
  .tab-btn .tab-lbl { font-size: 9.5px; }
  .tab-btn.active { color: var(--accent); }

  #import-file-input { display: none; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
</style>
</head>
<body>
<div id="app">
  <header><h1>Ledger</h1><span class="saving-tag" id="saving-tag" style="display:none">Saved ✓</span></header>
  <div class="flash-banner" id="flash-banner"></div>
  <main id="main"></main>
  <nav class="tabbar">
    <button class="tab-btn" data-view="allyears"><span class="tab-icon">📈</span><span class="tab-lbl">Overview</span></button>
    <button class="tab-btn" data-view="year"><span class="tab-icon">📊</span><span class="tab-lbl">Year</span></button>
    <button class="tab-btn" data-view="month"><span class="tab-icon">📅</span><span class="tab-lbl">Month</span></button>
    <button class="tab-btn" data-view="add"><span class="tab-icon">➕</span><span class="tab-lbl">Add</span></button>
    <button class="tab-btn" data-view="pockets"><span class="tab-icon">👛</span><span class="tab-lbl">Pockets</span></button>
    <button class="tab-btn" data-view="all"><span class="tab-icon">📋</span><span class="tab-lbl">All</span></button>
    <button class="tab-btn" data-view="manage"><span class="tab-icon">⚙️</span><span class="tab-lbl">Manage</span></button>
  </nav>
</div>
<input type="file" id="import-file-input" accept="application/json">
<script>
(function () {
'use strict';

// ── constants ────────────────────────────────────────────────────────────────
var ICON_CHOICES = ['🍽️','🚗','🏠','⚡','❤️','🛍️','📺','⋯','🎓','🐾','✈️','🎁','☕','📱','📶','🏋️','👶','🔧','💊','📚','🎵','👕','⛽','💵','🏦','🎯','🧳','🎮','🐶','🌿'];
var PAYMENT_METHODS = ['Cash','Card','Transfer','Other'];
var MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MONTH_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var STORAGE_KEY = 'ledger_v2';

// ── state ────────────────────────────────────────────────────────────────────
var state = {
  entries: [],
  // income: { 'YYYY-MM': { typeId: amount, ... } }
  income: {},
  incomeTypes: [
    { id: 'salary', label: 'Salary', icon: '💵' },
    { id: 'bonus', label: 'Bonus', icon: '🎁' },
  ],
  categories: [
    { id: 'food', label: 'Food', icon: '🍽️' },
    { id: 'transport', label: 'Transport', icon: '🚗' },
    { id: 'housing', label: 'Housing', icon: '🏠' },
    { id: 'utilities', label: 'Utilities', icon: '⚡' },
    { id: 'health', label: 'Health', icon: '❤️' },
    { id: 'shopping', label: 'Shopping', icon: '🛍️' },
    { id: 'entertainment', label: 'Fun', icon: '📺' },
    { id: 'other', label: 'Other', icon: '⋯' },
  ],
  budgets: {},
  // pockets: [ { id, label, icon, goal(optional), transactions: [{id,date,amount(+/-),note}] } ]
  pockets: [
    { id: 'p_travel', label: 'Travel fund', icon: '✈️', goal: 10000, transactions: [
      { id: 't1', date: '2026-04-01', amount: 2000, note: 'April saving' },
      { id: 't2', date: '2026-05-01', amount: 1200, note: 'May saving' },
    ]},
    { id: 'p_emergency', label: 'Emergency', icon: '🏦', goal: null, transactions: [
      { id: 't3', date: '2026-03-15', amount: 5000, note: 'Initial deposit' },
      { id: 't4', date: '2026-04-15', amount: 3500, note: 'Top up' },
    ]},
  ],
};

// mock entries
var mockEntries = [
  { id: 'e1', date: '2026-06-29', category: 'food', amount: 350, note: 'Lunch', method: 'Card' },
  { id: 'e2', date: '2026-06-29', category: 'transport', amount: 60, note: 'BTS', method: 'Cash' },
  { id: 'e3', date: '2026-06-28', category: 'food', amount: 420, note: 'Dinner', method: 'Card' },
  { id: 'e4', date: '2026-06-28', category: 'shopping', amount: 1200, note: 'Shirt', method: 'Card' },
  { id: 'e5', date: '2026-06-27', category: 'health', amount: 800, note: 'Doctor', method: 'Transfer' },
  { id: 'e6', date: '2026-06-27', category: 'food', amount: 200, note: 'Coffee', method: 'Cash' },
  { id: 'e7', date: '2026-05-15', category: 'housing', amount: 8000, note: 'Rent', method: 'Transfer' },
  { id: 'e8', date: '2026-05-10', category: 'food', amount: 1800, note: 'Groceries', method: 'Card' },
  { id: 'e9', date: '2026-04-20', category: 'entertainment', amount: 500, note: 'Movie', method: 'Card' },
  { id: 'e10', date: '2025-12-25', category: 'shopping', amount: 3200, note: 'Christmas gifts', method: 'Card' },
  { id: 'e11', date: '2025-06-01', category: 'food', amount: 900, note: 'Dining out', method: 'Cash' },
];
var mockIncome = {
  '2026-06': { salary: 30000, bonus: 0 },
  '2026-05': { salary: 30000, bonus: 0 },
  '2026-04': { salary: 30000, bonus: 5000 },
  '2025-12': { salary: 28000, bonus: 8000 },
};
var mockBudgets = {
  food: { '2026-01': 5000 },
  transport: { '2026-01': 1500 },
  housing: { '2026-01': 8000 },
  shopping: { '2026-01': 3000 },
};

var now = new Date();
var ui = {
  view: 'year',
  yearSel: now.getFullYear(),
  monthSel: now.getMonth(),
  editingId: null,
  form: null,
  expandCatId: null,
  allQuery: '',
  pocketView: null, // null=list, id=detail
  pocketTxnForm: null, // { pocketId, type:'deposit'|'withdraw', amount:'', note:'', date:'' }
  editPocketId: null,
  savedFlashId: null,
  budgetDrafts: {},
  newCatLabel: '', newCatIcon: ICON_CHOICES[0],
  newIncomeTypeLabel: '', newIncomeTypeIcon: '💵',
  newPocketLabel: '', newPocketIcon: '🏦', newPocketGoal: '',
  dayCollapsed: {},
  incomeInputs: {},
};

// ── helpers ──────────────────────────────────────────────────────────────────
function todayISO() { return new Date().toISOString().slice(0,10); }
function ymKey(year,m) { return year+'-'+String(m+1).padStart(2,'0'); }
function esc(s) {
  return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function uid(p) { return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
function fmtMoney(n) { var v=Math.round((Number(n)||0)*100)/100; return v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function catMeta(id) { for(var i=0;i<state.categories.length;i++) if(state.categories[i].id===id) return state.categories[i]; return {label:'Other',icon:'⋯'}; }
function resolveBudget(catId,ym) {
  var map=state.budgets[catId]; if(!map) return 0;
  if(map[ym]!==undefined) return map[ym];
  var keys=Object.keys(map).filter(function(k){return k<=ym;}).sort();
  return keys.length?map[keys[keys.length-1]]:0;
}
function pocketBalance(pocket) {
  return (pocket.transactions||[]).reduce(function(s,t){return s+Number(t.amount);},0);
}
function totalPocketSavings() {
  return state.pockets.reduce(function(s,p){return s+Math.max(0,pocketBalance(p));},0);
}
function getMonthIncomeTotal(ym) {
  var monthMap=state.income[ym]||{};
  return state.incomeTypes.reduce(function(s,t){return s+(Number(monthMap[t.id])||0);},0);
}
function getYearIncomeTotal(year) {
  var total=0;
  for(var m=0;m<12;m++) total+=getMonthIncomeTotal(ymKey(year,m));
  return total;
}
function getMonthSpend(ym) {
  return state.entries.filter(function(e){return e.date.slice(0,7)===ym;})
    .reduce(function(s,e){return s+Number(e.amount);},0);
}
function getYearSpend(year) {
  var total=0; for(var m=0;m<12;m++) total+=getMonthSpend(ymKey(year,m)); return total;
}
function getMonthPocketOut(ym) {
  var total=0;
  state.pockets.forEach(function(p){
    (p.transactions||[]).forEach(function(t){
      if(t.date.slice(0,7)===ym&&Number(t.amount)>0) total+=Number(t.amount);
    });
  });
  return total;
}
function getYearPocketOut(year) {
  var total=0; for(var m=0;m<12;m++) total+=getMonthPocketOut(ymKey(year,m)); return total;
}
function getKnownYears() {
  var set={};
  set[now.getFullYear()]=1;
  state.entries.forEach(function(e){set[Number(e.date.slice(0,4))]=1;});
  Object.keys(state.income).forEach(function(k){set[Number(k.slice(0,4))]=1;});
  return Object.keys(set).map(Number).sort(function(a,b){return b-a;});
}

// ── persistence ──────────────────────────────────────────────────────────────
var saveTimer=null;
function persist() {
  try { localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); } catch(e){}
  var tag=document.getElementById('saving-tag');
  tag.style.display='inline';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){tag.style.display='none';},900);
}
function loadLocal() {
  try {
    var raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    var p=JSON.parse(raw);
    if(!p||typeof p!=='object') return false;
    if(Array.isArray(p.entries)) state.entries=p.entries;
    if(p.income&&typeof p.income==='object') state.income=p.income;
    if(Array.isArray(p.incomeTypes)&&p.incomeTypes.length) state.incomeTypes=p.incomeTypes;
    if(Array.isArray(p.categories)&&p.categories.length) state.categories=p.categories;
    if(p.budgets&&typeof p.budgets==='object') state.budgets=p.budgets;
    if(Array.isArray(p.pockets)) state.pockets=p.pockets;
    return true;
  } catch(e){ return false; }
}
function exportBackup() {
  var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='ledger-backup-'+todayISO()+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}
function importFile(file) {
  var reader=new FileReader();
  reader.onload=function(){
    try {
      var p=JSON.parse(reader.result);
      if(!p||typeof p!=='object') throw new Error('Not a valid backup file.');
      if(Array.isArray(p.entries)) state.entries=p.entries;
      if(p.income&&typeof p.income==='object') state.income=p.income;
      if(Array.isArray(p.incomeTypes)&&p.incomeTypes.length) state.incomeTypes=p.incomeTypes;
      if(Array.isArray(p.categories)&&p.categories.length) state.categories=p.categories;
      if(p.budgets&&typeof p.budgets==='object') state.budgets=p.budgets;
      if(Array.isArray(p.pockets)) state.pockets=p.pockets;
      persist(); render(); flash('Backup imported successfully.','success');
    } catch(e){ flash('Could not import: '+e.message,'error'); }
  };
  reader.readAsText(file);
}
function flash(msg,type) {
  var el=document.getElementById('flash-banner');
  el.textContent=(type==='success'?'✓ ':'⚠️ ')+msg;
  el.className='flash-banner show '+(type||'error');
  setTimeout(function(){el.classList.remove('show');},2600);
}

// ── ALL YEARS ─────────────────────────────────────────────────────────────────
function renderAllYears() {
  var years=getKnownYears();
  var maxSpend=1,maxInc=1;
  years.forEach(function(y){
    maxSpend=Math.max(maxSpend,getYearSpend(y));
    maxInc=Math.max(maxInc,getYearIncomeTotal(y));
  });
  var maxBar=Math.max(maxSpend,maxInc,1);

  var bars='';
  years.slice().reverse().forEach(function(y){
    var inc=getYearIncomeTotal(y), sp=getYearSpend(y);
    var hi=Math.max(inc>0?4:0,Math.round((inc/maxBar)*100));
    var hs=Math.max(sp>0?4:0,Math.round((sp/maxBar)*100));
    bars+='<button class="bar-col" data-jump-year="'+y+'" style="min-width:36px;">' +
      '<div class="bar-track-double">' +
        '<div class="bar-fill" style="height:'+hi+'%;background:var(--accent);"></div>' +
        '<div class="bar-fill" style="height:'+hs+'%;background:var(--border);"></div>' +
      '</div>' +
      '<span class="bar-month'+(y===now.getFullYear()?' current':'')+'">'+y+'</span>' +
    '</button>';
  });

  var rowsHtml='';
  years.forEach(function(y){
    var inc=getYearIncomeTotal(y), sp=getYearSpend(y), po=getYearPocketOut(y);
    var rem=inc-sp-po;
    rowsHtml+='<button class="year-summary-row" data-jump-year="'+y+'">' +
      '<span class="year-summary-yr">'+y+'</span>' +
      '<span class="year-summary-mid">' +
        '<span class="year-summary-label">Income '+fmtMoney(inc)+' · Spent '+fmtMoney(sp)+'</span><br>' +
        '<span class="year-summary-val'+(rem<0?' danger':'')+'">Remaining '+fmtMoney(rem)+'</span>' +
      '</span>' +
      '<span class="year-summary-chevron">›</span>' +
    '</button>';
  });

  var pocketTotal=totalPocketSavings();

  return '<p class="section-label" style="margin-bottom:12px;">All years overview</p>' +
    '<div class="metric-card full" style="margin-bottom:16px;">' +
      '<p class="metric-label">Total saved across all pockets</p>' +
      '<p class="metric-value">'+fmtMoney(pocketTotal)+'</p>' +
    '</div>' +
    '<p class="section-label">Income vs spend by year</p>' +
    '<div class="legend-row"><span class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>Income</span><span class="legend-item"><span class="legend-dot" style="background:var(--border)"></span>Spend</span></div>' +
    '<div class="bar-chart" style="height:90px;gap:6px;">'+bars+'</div>' +
    '<p class="section-label" style="margin-top:16px;">By year — tap to open</p>' +
    rowsHtml;
}

// ── YEAR ──────────────────────────────────────────────────────────────────────
function renderYear() {
  var year=ui.yearSel;
  var monthlySpend=[],monthlyInc=[];
  for(var m=0;m<12;m++){
    var ym=ymKey(year,m);
    monthlySpend.push(getMonthSpend(ym));
    monthlyInc.push(getMonthIncomeTotal(ym));
  }
  var yearSpend=monthlySpend.reduce(function(a,b){return a+b;},0);
  var yearInc=monthlyInc.reduce(function(a,b){return a+b;},0);
  var yearPO=getYearPocketOut(year);
  var yearRem=yearInc-yearSpend-yearPO;
  var maxBar=Math.max.apply(null,monthlySpend.concat(monthlyInc,[1]));

  var bars='';
  for(var i=0;i<12;i++){
    var sp=monthlySpend[i], inc=monthlyInc[i];
    var hs=Math.max(sp>0?4:0,Math.round((sp/maxBar)*100));
    var hi=Math.max(inc>0?4:0,Math.round((inc/maxBar)*100));
    var cur=year===now.getFullYear()&&i===now.getMonth();
    var over=inc>0&&sp>inc;
    bars+='<button class="bar-col" data-jump-month="'+i+'">' +
      '<div class="bar-track-double">' +
        '<div class="bar-fill" style="height:'+hi+'%;background:var(--accent);"></div>' +
        '<div class="bar-fill" style="height:'+hs+'%;background:'+(over?'var(--danger)':'var(--border)')+'"></div>' +
      '</div><span class="bar-month'+(cur?' current':'')+'">'+ MONTH_NAMES[i]+'</span></button>';
  }

  // income breakdown
  var incomeTotals={};
  for(var m2=0;m2<12;m2++){
    var ym2=ymKey(year,m2), mmap=state.income[ym2]||{};
    state.incomeTypes.forEach(function(t){ incomeTotals[t.id]=(incomeTotals[t.id]||0)+(Number(mmap[t.id])||0); });
  }
  var maxInc2=Math.max.apply(null,state.incomeTypes.map(function(t){return incomeTotals[t.id]||0;}).concat([1]));
  var incBreakHtml='';
  state.incomeTypes.forEach(function(t){
    var amt=incomeTotals[t.id]||0; if(!amt) return;
    var pct=Math.round((amt/maxInc2)*100);
    incBreakHtml+='<div class="income-bar-row">' +
      '<span class="income-bar-label">'+t.icon+' '+esc(t.label)+'</span>' +
      '<div class="income-bar-track"><div class="income-bar-fill" style="width:'+pct+'%"></div></div>' +
      '<span class="income-bar-amt">'+fmtMoney(amt)+'</span>' +
    '</div>';
  });

  // pockets overview
  var pockHtml='';
  state.pockets.forEach(function(p){
    var bal=pocketBalance(p);
    var pct=p.goal>0?Math.min(100,Math.round((bal/p.goal)*100)):0;
    pockHtml+='<div style="display:flex;align-items:center;gap:10px;background:var(--surface-2);border-radius:var(--radius);padding:8px 10px;margin-bottom:6px;">' +
      '<span style="font-size:18px;">'+p.icon+'</span>' +
      '<span style="font-size:13px;flex:1;">'+esc(p.label)+'</span>' +
      (p.goal>0
        ? '<div style="width:60px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;"><div style="width:'+pct+'%;height:100%;background:var(--accent);border-radius:3px;"></div></div><span style="font-size:12px;color:var(--text-2);white-space:nowrap;">'+fmtMoney(bal)+'/'+fmtMoney(p.goal)+'</span>'
        : '<span style="font-size:13px;font-weight:600;">'+fmtMoney(bal)+'</span>') +
    '</div>';
  });

  return '<div class="picker-row">' +
    '<button class="icon-btn" id="year-prev">‹</button>' +
    '<span class="picker-label">'+year+'</span>' +
    '<button class="icon-btn" id="year-next">›</button>' +
  '</div>' +
  '<div class="metric-grid">' +
    '<div class="metric-card"><p class="metric-label">Income</p><p class="metric-value sm">'+fmtMoney(yearInc)+'</p></div>' +
    '<div class="metric-card"><p class="metric-label">Spent</p><p class="metric-value sm">'+fmtMoney(yearSpend)+'</p></div>' +
    '<div class="metric-card"><p class="metric-label">Pockets out</p><p class="metric-value sm">'+fmtMoney(yearPO)+'</p></div>' +
    '<div class="metric-card"><p class="metric-label">Remaining</p><p class="metric-value sm'+(yearRem<0?' danger':'')+'">'+fmtMoney(yearRem)+'</p></div>' +
  '</div>' +
  '<div class="legend-row"><span class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>Income</span><span class="legend-item"><span class="legend-dot" style="background:var(--border)"></span>Spend</span></div>' +
  '<div class="bar-chart">'+bars+'</div>' +
  (incBreakHtml?'<p class="section-label" style="margin-top:14px;">Income breakdown</p>'+incBreakHtml:'') +
  '<p class="section-label" style="margin-top:14px;">Pockets</p>' +
  (pockHtml||'<p class="hint">No pockets yet — add one from the Pockets tab.</p>') +
  '<p class="hint" style="margin-top:6px;">Tap a bar to open that month.</p>';
}

  // income inputs per type
  var incInputs='';
  state.incomeTypes.forEach(function(t){

  // budget vs actual

  }).filter(function(r){return r.spend>0||r.budget>0;});

          '<span class="pocket-txn-note">'+esc(t.note||'—')+'</span>' +

        '</div>';
      });
      txnHtml+='</div>';
    }
    cardsHtml+='<div class="pocket-card">' +
      '<div class="pocket-card-head">' +
        '<span class="pocket-icon">'+p.icon+'</span>' +
        '<span class="pocket-name">'+esc(p.label)+'</span>' +
        '<span class="pocket-balance">'+fmtMoney(bal)+'</span>' +
        '<button class="mini-icon-btn" data-edit-pocket="'+esc(p.id)+'">✏️</button>' +
        '<button class="mini-icon-btn" data-del-pocket="'+esc(p.id)+'">🗑️</button>' +
      '</div>' +
      (p.goal>0?'<div class="pocket-goal-row">' +
        '<div class="pocket-progress-track"><div class="pocket-progress-fill" style="width:'+pct+'%"></div></div>' +
        '<span class="pocket-goal-label">'+pct+'% of '+fmtMoney(p.goal)+'</span>' +

      txnHtml+
      '<div class="pocket-actions">' +
        '<button class="pocket-btn primary" data-pocket-deposit="'+esc(p.id)+'">＋ Deposit</button>' +
        '<button class="pocket-btn" data-pocket-withdraw="'+esc(p.id)+'">－ Withdraw</button>' +
      '</div>' +
    '</div>';
  });

  return '<p class="section-label">Pockets</p>' +
    '<div class="metric-card full" style="margin-bottom:16px;">' +
      '<p class="metric-label">Total saved</p>' +
      '<p class="metric-value">'+fmtMoney(totalSaved)+'</p>' +
    '</div>' +
    (cardsHtml||'<div class="empty-state"><span class="big-icon">👛</span><p class="empty-text">No pockets yet. Add one below!</p></div>') +
    '<div class="divider"></div>' +
    '<p class="section-label">New pocket</p>' +
    '<div class="new-item-card">' +
      '<div class="form-group"><label>Name</label><input id="new-pocket-label" type="text" maxlength="30" placeholder="e.g. Travel fund" value="'+esc(ui.newPocketLabel)+'"></div>' +
      '<div class="form-group"><label>Goal amount (optional)</label><input id="new-pocket-goal" type="number" inputmode="decimal" min="0" step="0.01" placeholder="Leave blank for no goal" value="'+esc(ui.newPocketGoal)+'"></div>' +
      '<div class="form-group"><label>Icon</label><div class="icon-pick-row" id="new-pocket-icon-row">'+
        ICON_CHOICES.map(function(ic){ return '<button class="icon-pick-btn'+(ic===ui.newPocketIcon?' selected':'')+'" data-new-pocket-icon="'+ic+'">'+ic+'</button>'; }).join('')+
      '</div></div>' +
      '<button class="submit-btn" id="add-pocket-btn">Add pocket</button>' +
    '</div>';
}

// ── ALL ───────────────────────────────────────────────────────────────────────
function renderAll() {
  var sheet=state.categories.map(function(c){
    var list=state.entries.filter(function(e){return e.category===c.id;}).sort(function(a,b){return b.date.localeCompare(a.date);});
    var total=list.reduce(function(s,e){return s+Number(e.amount);},0);
    return {id:c.id,label:c.label,icon:c.icon,entries:list,total:total};
  }).sort(function(a,b){return b.total-a.total;});
  var grand=sheet.reduce(function(s,c){return s+c.total;},0);
  var q=(ui.allQuery||'').trim().toLowerCase();
  var filtered=q?sheet.filter(function(c){return c.label.toLowerCase().indexOf(q)!==-1;}):sheet;

  var listHtml='';
  filtered.forEach(function(c){
    var isOpen=ui.expandCatId===c.id;
    listHtml+='<div class="sheet-card">' +
      '<button class="sheet-card-head" data-toggle-cat="'+esc(c.id)+'">' +
        '<span style="font-size:17px;">'+c.icon+'</span>' +
        '<span class="sheet-card-label">'+esc(c.label)+'</span>' +
        '<span class="sheet-card-count">'+c.entries.length+' entries</span>' +
        '<span class="sheet-card-total">'+fmtMoney(c.total)+'</span>' +
        '<span style="font-size:13px;color:var(--text-3);">'+(isOpen?'▲':'▼')+'</span>' +
      '</button>';
    if(isOpen){
      if(!c.entries.length) listHtml+='<p class="sheet-empty">No expenses logged yet.</p>';
      else {
        listHtml+='<div class="sheet-entry-list">';
        c.entries.forEach(function(en){
          listHtml+='<div class="entry-row">' +
            '<span class="entry-date-full">'+en.date+'</span>' +
            '<div class="entry-mid"><p class="entry-cat">'+esc(en.note||'—')+'</p><p class="entry-meta">'+esc(en.method)+'</p></div>' +
            '<span class="entry-amt">'+fmtMoney(en.amount)+'</span>' +
            '<div class="entry-actions">' +
              '<button class="mini-icon-btn" data-edit-entry="'+esc(en.id)+'">✏️</button>' +
              '<button class="mini-icon-btn" data-del-entry="'+esc(en.id)+'">🗑️</button>' +
            '</div></div>';
        });
        listHtml+='</div>';
      }
    }
    listHtml+='</div>';
  });
  if(!filtered.length) listHtml='<div class="empty-state"><span class="big-icon">🔍</span><p class="empty-text">No categories match "'+esc(q)+'".</p></div>';

  return '<p class="section-label">All categories — full history</p>' +
    '<input type="text" id="all-search" placeholder="Find a category" value="'+esc(ui.allQuery||'')+'" style="margin-bottom:14px;">' +
    '<div class="metric-card full" style="margin-bottom:14px;"><p class="metric-label">Total across all categories</p><p class="metric-value">'+fmtMoney(grand)+'</p></div>' +
    listHtml;
}

// ── WIRING ────────────────────────────────────────────────────────────────────
function freshForm(dateOverride){
  return { date:dateOverride||todayISO(), category:(state.categories[0]&&state.categories[0].id)||'other', amount:'', note:'', method:'Card' };
}
if(!ui.form) ui.form=freshForm();

function wire(){
  // tab bar
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.onclick=function(){ ui.view=b.getAttribute('data-view'); render(); };
  });

  // year pickers
  var yp=document.getElementById('year-prev'); if(yp) yp.onclick=function(){ ui.yearSel--; render(); };
  var yn=document.getElementById('year-next'); if(yn) yn.onclick=function(){ ui.yearSel++; render(); };
  var mp=document.getElementById('month-prev'); if(mp) mp.onclick=function(){ ui.monthSel=ui.monthSel===0?11:ui.monthSel-1; ui.incomeInputs={}; render(); };
  var mn=document.getElementById('month-next'); if(mn) mn.onclick=function(){ ui.monthSel=ui.monthSel===11?0:ui.monthSel+1; ui.incomeInputs={}; render(); };

  // jump to year/month from charts
  document.querySelectorAll('[data-jump-year]').forEach(function(b){
    b.onclick=function(){ ui.yearSel=Number(b.getAttribute('data-jump-year')); ui.view='year'; render(); };
  });
  document.querySelectorAll('[data-jump-month]').forEach(function(b){
    b.onclick=function(){ ui.monthSel=Number(b.getAttribute('data-jump-month')); ui.view='month'; render(); };
  });

  // income inputs
  document.querySelectorAll('[data-income-type]').forEach(function(inp){
    inp.oninput=function(){ ui.incomeInputs[inp.getAttribute('data-ym')+'_'+inp.getAttribute('data-income-type')]=inp.value; };
  });
  var si=document.getElementById('save-income');
  if(si) si.onclick=function(){
    var ym=ymKey(ui.yearSel,ui.monthSel);
    if(!state.income[ym]) state.income[ym]={};
    document.querySelectorAll('[data-income-type]').forEach(function(inp){
      var tid=inp.getAttribute('data-income-type'), val=parseFloat(inp.value);
      if(!isNaN(val)&&val>=0) state.income[ym][tid]=val; else delete state.income[ym][tid];
    });
    ui.incomeInputs={}; persist(); render(); flash('Income saved.','success');
  };

  // goto add from month
  var ga=document.getElementById('goto-add');
  if(ga) ga.onclick=function(){
    ui.editingId=null;
    var ym=ymKey(ui.yearSel,ui.monthSel);
    ui.form=freshForm(ym+'-'+String(Math.min(now.getDate(),28)).padStart(2,'0'));
    ui.view='add'; render();
  };

  // day collapse
  document.querySelectorAll('[data-toggle-day]').forEach(function(b){
    b.onclick=function(){ var d=b.getAttribute('data-toggle-day'); ui.dayCollapsed[d]=!ui.dayCollapsed[d]; render(); };
  });

  // open category in All page
  document.querySelectorAll('[data-open-cat]').forEach(function(b){
    b.onclick=function(){ ui.expandCatId=b.getAttribute('data-open-cat'); ui.view='all'; render(); };
  });

  // add form
  var fd=document.getElementById('f-date'); if(fd) fd.oninput=function(){ui.form.date=fd.value;};
  var fa=document.getElementById('f-amount'); if(fa) fa.oninput=function(){ui.form.amount=fa.value;};
  var fc=document.getElementById('f-cat'); if(fc) fc.onchange=function(){ui.form.category=fc.value; render();};
  var fm=document.getElementById('f-method'); if(fm) fm.onchange=function(){ui.form.method=fm.value;};
  var fn=document.getElementById('f-note'); if(fn) fn.oninput=function(){ui.form.note=fn.value;};
  document.querySelectorAll('[data-pick-cat]').forEach(function(tile){
    tile.onclick=function(){ui.form.category=tile.getAttribute('data-pick-cat'); render();};
    tile.onkeydown=function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();ui.form.category=tile.getAttribute('data-pick-cat');render();}};
  });
  var ce=document.getElementById('cancel-edit'); if(ce) ce.onclick=function(){ui.editingId=null;ui.form=freshForm();render();};
  var se=document.getElementById('submit-entry');
  if(se) se.onclick=function(){
    var msgEl=document.getElementById('form-msg');
    function showMsg(t,err){msgEl.textContent=t;msgEl.className='form-msg '+(err?'err':'ok');msgEl.style.display='block';if(!err)setTimeout(function(){msgEl.style.display='none';},2200);}
    try{
      var f=ui.form, amt=parseFloat(f.amount);
      if(!f.date){showMsg('Pick a date.',true);return;}
      if(!amt||amt<=0){showMsg('Enter an amount greater than 0.',true);return;}
      if(ui.editingId){
        state.entries=state.entries.map(function(en){
          return en.id===ui.editingId?{id:en.id,date:f.date,category:f.category,amount:amt,note:(f.note||'').trim(),method:f.method}:en;
        });
      } else {
        state.entries.unshift({id:uid('e'),date:f.date,category:f.category,amount:amt,note:(f.note||'').trim(),method:f.method});
      }
      state.entries.sort(function(a,b){return b.date.localeCompare(a.date);});
      persist(); var keepDate=f.date; ui.editingId=null; ui.form=freshForm(keepDate); render();
      var m2=document.getElementById('form-msg'); if(m2){m2.textContent='Entry added.';m2.className='form-msg ok';m2.style.display='block';setTimeout(function(){var x=document.getElementById('form-msg');if(x)x.style.display='none';},2200);}
    } catch(e){showMsg('Error: '+e.message,true);}
  };

  // edit/delete entries
  document.querySelectorAll('[data-edit-entry]').forEach(function(b){
    b.onclick=function(){
      var id=b.getAttribute('data-edit-entry'), en=state.entries.find(function(e){return e.id===id;}); if(!en) return;
      ui.form={date:en.date,category:en.category,amount:String(en.amount),note:en.note||'',method:en.method||'Card'};
      ui.editingId=id; ui.view='add'; render();
    };
  });
  document.querySelectorAll('[data-del-entry]').forEach(function(b){
    b.onclick=function(){
      var id=b.getAttribute('data-del-entry');
      state.entries=state.entries.filter(function(e){return e.id!==id;}); persist(); render();
    };
  });

  // pockets
  document.querySelectorAll('[data-pocket-deposit]').forEach(function(b){
    b.onclick=function(){ ui.pocketTxnForm={pocketId:b.getAttribute('data-pocket-deposit'),type:'deposit',amount:'',note:'',date:todayISO()}; render(); };
  });
  document.querySelectorAll('[data-pocket-withdraw]').forEach(function(b){
    b.onclick=function(){ ui.pocketTxnForm={pocketId:b.getAttribute('data-pocket-withdraw'),type:'withdraw',amount:'',note:'',date:todayISO()}; render(); };
  });
  document.querySelectorAll('[data-edit-pocket]').forEach(function(b){
    b.onclick=function(){ ui.editPocketId=b.getAttribute('data-edit-pocket'); render(); };
  });
  document.querySelectorAll('[data-del-pocket]').forEach(function(b){
    b.onclick=function(){ state.pockets=state.pockets.filter(function(p){return p.id!==b.getAttribute('data-del-pocket');}); persist(); render(); };
  });
  document.querySelectorAll('[data-del-txn]').forEach(function(b){
    b.onclick=function(){
      var pid=b.getAttribute('data-pocket-id'), tid=b.getAttribute('data-del-txn');
      state.pockets=state.pockets.map(function(p){
        if(p.id!==pid) return p;
        return Object.assign({},p,{transactions:(p.transactions||[]).filter(function(t){return t.id!==tid;})});
      }); persist(); render();
    };
  });
  var bp=document.getElementById('back-pocket'); if(bp) bp.onclick=function(){ui.pocketTxnForm=null;ui.editPocketId=null;render();};
  var st=document.getElementById('submit-txn');
  if(st) st.onclick=function(){
    var msgEl=document.getElementById('txn-msg');
    function showMsg(t,err){msgEl.textContent=t;msgEl.className='form-msg '+(err?'err':'ok');msgEl.style.display='block';}
    var f=ui.pocketTxnForm;
    var dateEl=document.getElementById('txn-date'), amtEl=document.getElementById('txn-amount'), noteEl=document.getElementById('txn-note');
    var date=dateEl?dateEl.value:'', amt=parseFloat(amtEl?amtEl.value:''), note=noteEl?noteEl.value:'';
    if(!date){showMsg('Pick a date.',true);return;}
    if(!amt||amt<=0){showMsg('Enter an amount greater than 0.',true);return;}
    var finalAmt=f.type==='withdraw'?-Math.abs(amt):Math.abs(amt);
    state.pockets=state.pockets.map(function(p){
      if(p.id!==f.pocketId) return p;
      var txns=(p.transactions||[]).concat([{id:uid('t'),date:date,amount:finalAmt,note:note.trim()}]);
      return Object.assign({},p,{transactions:txns});
    });
    persist(); ui.pocketTxnForm=null; render(); flash((f.type==='deposit'?'Deposited':'Withdrawn')+' '+fmtMoney(amt),'success');
  };
  var newPocketIconRow=document.getElementById('new-pocket-icon-row');
  if(newPocketIconRow){
    document.querySelectorAll('[data-new-pocket-icon]').forEach(function(b){
      b.onclick=function(){ui.newPocketIcon=b.getAttribute('data-new-pocket-icon');render();};
    });
  }
  var apb=document.getElementById('add-pocket-btn');
  if(apb) apb.onclick=function(){
    var label=(document.getElementById('new-pocket-label')||{}).value||''; label=label.trim();
    if(!label){flash('Enter a pocket name.','error');return;}
    var goal=parseFloat((document.getElementById('new-pocket-goal')||{}).value);
    state.pockets.push({id:uid('p'),label:label,icon:ui.newPocketIcon,goal:(!isNaN(goal)&&goal>0)?goal:null,transactions:[]});
    ui.newPocketLabel=''; ui.newPocketGoal=''; ui.newPocketIcon=ICON_CHOICES[0]; persist(); render(); flash('Pocket added.','success');
  };
  var sep=document.getElementById('save-edit-pocket');
  if(sep) sep.onclick=function(){
    var label=(document.getElementById('edit-pocket-label')||{}).value||''; label=label.trim();
    if(!label){flash('Enter a name.','error');return;}
    var goal=parseFloat((document.getElementById('edit-pocket-goal')||{}).value);
    state.pockets=state.pockets.map(function(p){
      if(p.id!==ui.editPocketId) return p;
      return Object.assign({},p,{label:label,goal:(!isNaN(goal)&&goal>0)?goal:null});
    }); persist(); ui.editPocketId=null; render(); flash('Pocket updated.','success');
  };
  document.querySelectorAll('[data-edit-pocket-icon]').forEach(function(b){
    b.onclick=function(){
      var pid=b.getAttribute('data-pocket-id'), ic=b.getAttribute('data-edit-pocket-icon');
      state.pockets=state.pockets.map(function(p){return p.id===pid?Object.assign({},p,{icon:ic}):p;});
      persist(); render();
    };
  });

  // all search
  var as=document.getElementById('all-search');
  if(as){
    as.oninput=function(){ui.allQuery=as.value;render();setTimeout(function(){var x=document.getElementById('all-search');if(x){x.focus();var v=x.value;x.value='';x.value=v;}},0);};
  }
  document.querySelectorAll('[data-toggle-cat]').forEach(function(b){
    b.onclick=function(){ var id=b.getAttribute('data-toggle-cat'); ui.expandCatId=ui.expandCatId===id?null:id; render(); };
  });

  // manage
  document.querySelectorAll('[data-rename-cat]').forEach(function(inp){
    inp.onblur=function(){
      var id=inp.getAttribute('data-rename-cat'), label=inp.value.trim(); if(!label) return;
      state.categories=state.categories.map(function(c){return c.id===id?Object.assign({},c,{label:label}):c;}); persist();
    };
  });
  document.querySelectorAll('[data-del-cat]').forEach(function(b){
    b.onclick=function(){
      if(state.categories.length<=1) return;
      var id=b.getAttribute('data-del-cat');
      state.categories=state.categories.filter(function(c){return c.id!==id;}); delete state.budgets[id]; persist(); render();
    };
  });
  document.querySelectorAll('[data-budget-draft]').forEach(function(inp){
    inp.oninput=function(){ui.budgetDrafts[inp.getAttribute('data-budget-draft')]=inp.value;};
  });
  document.querySelectorAll('[data-set-budget]').forEach(function(b){
    b.onclick=function(){
      var id=b.getAttribute('data-set-budget'), ym=ymKey(ui.yearSel,ui.monthSel);
      var raw=ui.budgetDrafts[id]!==undefined?ui.budgetDrafts[id]:'', amt=parseFloat(raw);
      if(!state.budgets[id]) state.budgets[id]={};
      if(raw===''||isNaN(amt)) delete state.budgets[id][ym]; else state.budgets[id][ym]=amt;
      persist(); ui.savedFlashId=id; render(); setTimeout(function(){ui.savedFlashId=null;},1500);
    };
  });
  document.querySelectorAll('[data-set-cat-icon]').forEach(function(b){
    b.onclick=function(){
      var id=b.getAttribute('data-set-cat-icon'), ic=b.getAttribute('data-icon-val');
      state.categories=state.categories.map(function(c){return c.id===id?Object.assign({},c,{icon:ic}):c;}); persist(); render();
    };
  });
  document.querySelectorAll('[data-rename-income]').forEach(function(inp){
    inp.onblur=function(){
      var id=inp.getAttribute('data-rename-income'), label=inp.value.trim(); if(!label) return;
      state.incomeTypes=state.incomeTypes.map(function(t){return t.id===id?Object.assign({},t,{label:label}):t;}); persist();
    };
  });
  document.querySelectorAll('[data-del-income]').forEach(function(b){
    b.onclick=function(){
      if(state.incomeTypes.length<=1) return;
      var id=b.getAttribute('data-del-income');
      state.incomeTypes=state.incomeTypes.filter(function(t){return t.id!==id;}); persist(); render();
    };
  });
  document.querySelectorAll('[data-set-income-icon]').forEach(function(b){
    b.onclick=function(){
      var id=b.getAttribute('data-set-income-icon'), ic=b.getAttribute('data-icon-val');
      state.incomeTypes=state.incomeTypes.map(function(t){return t.id===id?Object.assign({},t,{icon:ic}):t;}); persist(); render();
    };
  });
  document.querySelectorAll('[data-new-cat-icon]').forEach(function(b){
    b.onclick=function(){ui.newCatIcon=b.getAttribute('data-new-cat-icon');render();setTimeout(function(){var x=document.getElementById('new-cat-label');if(x)x.focus();},0);};
  });
  document.querySelectorAll('[data-new-income-icon]').forEach(function(b){
    b.onclick=function(){ui.newIncomeTypeIcon=b.getAttribute('data-new-income-icon');render();setTimeout(function(){var x=document.getElementById('new-income-label');if(x)x.focus();},0);};
  });
  var acb=document.getElementById('add-cat-btn');
  if(acb) acb.onclick=function(){
    var label=(document.getElementById('new-cat-label')||{}).value||''; label=label.trim();
    if(!label){flash('Enter a category name.','error');return;}
    state.categories.push({id:uid('c'),label:label,icon:ui.newCatIcon}); ui.newCatLabel=''; ui.newCatIcon=ICON_CHOICES[0]; persist(); render(); flash('Category added.','success');
  };
  var aib=document.getElementById('add-income-btn');
  if(aib) aib.onclick=function(){
    var label=(document.getElementById('new-income-label')||{}).value||''; label=label.trim();
    if(!label){flash('Enter an income type name.','error');return;}
    state.incomeTypes.push({id:uid('i'),label:label,icon:ui.newIncomeTypeIcon}); ui.newIncomeTypeLabel=''; ui.newIncomeTypeIcon='💵'; persist(); render(); flash('Income type added.','success');
  };

  // backup
  var eb=document.getElementById('export-btn'); if(eb) eb.onclick=function(){exportBackup();flash('Backup downloaded.','success');};
  var ib=document.getElementById('import-btn'); if(ib) ib.onclick=function(){document.getElementById('import-file-input').click();};
}

// ── init ──────────────────────────────────────────────────────────────────────
document.getElementById('import-file-input').addEventListener('change',function(e){
  var f=e.target.files&&e.target.files[0]; if(f) importFile(f); e.target.value='';
});

var hasLocalData=loadLocal();
if(!hasLocalData){
  // load mock data so first-time users see a populated demo
  state.entries=mockEntries;
  state.income=mockIncome;
  state.budgets=mockBudgets;
}
if(!ui.form) ui.form=freshForm();
render();
})();
</script>
</body>
</html>
